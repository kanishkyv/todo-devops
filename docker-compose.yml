services:
  mongo:
    image: mongo:7
    container_name: todo-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      target: runtime
    container_name: todo-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      SERVICE_NAME: todo-api
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/todo
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  mongo_data:
